services:
  postgre:
    image: postgres:17.2-alpine
    restart: always
    environment:
      POSTGRES_USER: ${PU}
      POSTGRES_PASSWORD: ${PP}
      POSTGRES_NAME: ${PN}
      POSTGRES_HOST: ${PH}
    ports: 
      - "5434:5432"
    volumes:
      - vote_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always
    ports: 
      - "6390:6379"

volumes:
  vote_data: